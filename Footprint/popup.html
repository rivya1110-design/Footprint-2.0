<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&display=swap"
          rel="stylesheet">
    <title> Footprint </title>
    <style>
        body {
            background-color: #1e1220;
            width: 543px;
            min-height: 330px;
            margin: 0;
            padding: 30px 20px 20px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #ffc6f9;
            overflow: hidden;
            box-sizing: border-box;
            border: 2px solid #ffc6f9;
        }
        button {
            background-color: transparent;
            border: 1px solid #ffc6f9;
            color: #ffc6f9;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: Marker Felt, fantasy;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        button:hover {
            border-color: #cc60c1;
            color: #cc60c1;
        }
        
        /* Header */ 
        h1 {
            font-family: "Pixelify Sans", monospace;
            font-size: 40px;
            font-weight: 600;
            margin: 0 0 10px; 
            line-height: 1.05; 
        }
        p {
            font-family: "OCR A Std", monospace;
            font-size: 18px;
            font-style: italic;
            color: #c55b5b;
        }
        .mycontainer {
            display: flex;
            min-height: 100%;
            align-items: stretch;
        }
        .left {
            flex: 0 0 55%;
            width: auto;
            margin: 0;
            padding-right: 14px;
            border-right: 1px solid #ffc6f9;
            box-sizing: border-box;
        }
        .left > p {
            margin: 16px 0 5px;
            line-height: 1.5;
        }
        .title-link {
            text-decoration: none;
        }
        .title-link h1 {
            color: #ffc6f9;       
            transition: color 0.2s;
        }
        .title-link:hover h1 {
            color: #cc60c1;        
        }
        .title-link:visited,
        .title-link:active {
            color: inherit;
            text-decoration: none;
        }
        .capybara {
            width: 130px;
            height: auto;
            margin-top: 0;
            transform: translateY(20px);
            transform: translateX(-15px);
            image-rendering: pixelated;
        }

        /* Features */
        .right {
            flex: 1;
            width: auto;
            padding-left: 14px;
            text-align: left;
            box-sizing: border-box;
        }
        #scanBTN {
            display: block;
            width: 156px;
            margin-bottom: 10px;
            padding: 8px 16px;
        }
        .result-box {
            width: 200px;
            min-height: 110px;
            padding: 12px 16px;
            margin-bottom: 13px;
            border: 1px solid #5e3a5b;
            border-radius: 8px;
            background-color: #2a1a2a;
            box-sizing: border-box;
        }
        .result-title {
            color: #cc60c1;
            font-family: "Pixelify Sans", monospace;
            font-size: 25px;
            font-style: normal;
            margin: 0 0 9px; 
        }
        .result-text p {
            margin: 0;
            line-height: 1.5;
            font-family: "OCR A Std", monospace;
            font-size: 14px;
            font-style: italic;
        }
        #resultContent {
            color: #ffc6f9;
            font-family: "OCR A Std", monospace;
            font-size: 14px;
            font-style: italic;
        }
        .cyberHygine {
            display: block;
            width: 156px;
            padding: 8px 16px;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid #ffc6f9;
            border-radius: 8px;
            color: #ffc6f9;
            font-family: Marker Felt, fantasy;
            font-size: 20px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .cyberHygine:hover {
            border-color: #cc60c1;
            color: #cc60c1;
            text-decoration: none;
        }
         .more-features {
           display: block;
            width: 156px;
            padding: 8px 16px;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid #ffc6f9;
            border-radius: 8px;
            color: #ffc6f9;
            font-family: Marker Felt, fantasy;
            font-size: 20px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .more-features:hover {
            border-color: #cc60c1;
            color: #cc60c1;
            text-decoration: none;
        }

    </style>
</head>
<body>
    <!-- for 1st sec -->
    <!-- change capybara pic ltr -->
    <div class= "mycontainer" >

        <div class = "left">
            <a 
                class="title-link" 
                href="index.html" 
                target="_blank">
                    <h1> Welcome to <br> Footprint! </h1>
            </a>
            <p> Browse without leaving a vulnerable footprint!👣 </p> 
            <img class="capybara" src="icon/capybara_black_-removebg-preview.png" alt="Capybara Image">

        </div>

        <!-- for 2nd sec -->
        <div class="right">

            <button id="moreFeaturesBtn" class="more-features" type="button"> More Features </button> 
            <a id="cyberHygieneBtn" class="cyberHygine" href="hygiene.html" target="_blank"> Cyber Hygiene </a>
            <button id="scanBTN" type="button">
                Re-scan 
            </button>

            <div class="result-box">
                <p class="result-title">Scan Results</p>

                <div id="resultContent" class="result-text">
                    <p>No scan performed yet.</p>
                </div>
            </div>

        </div> 
    </div> 

    <script src="popup.js"></script>

</body>
</html>
