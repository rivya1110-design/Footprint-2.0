<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&display=swap"
          rel="stylesheet">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Footprint - Scan History</title>

    <style>
        :root {
            --bg: #1e1220;
            --bg2: #2a1a2a;
            --pink: #ffc6f9;
            --purple: #cc60c1;
            --text: #f0d6ee;
            --muted: #9a7898;
            --border: #4a2a4a;
            --safe: #50f366;
            --warning: #ff9328;
            --danger: #d62020;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            min-height: 100%;
            scroll-behavior: smooth;
            scroll-padding-top: 96px;
        }

        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
            color: var(--text);
        }

         /* Navigation */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 48px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(30,18,32,0.92);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: "Pixelify Sans", monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--pink);
            text-decoration: none;
            }
        .nav-logo img {
            width: 80px;
            image-rendering: pixelated;
         }
        .nav-logo:hover {
            color: var(--purple);
        }
         .nav-links {
            display: flex;
            align-items: center;
            gap: 27px;
            list-style: none;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-family: "OCR A Std", monospace;
            font-size: 18px;
            font-weight: 600;
        }
        .nav-links a:hover,
        .nav-links .active {
            color: var(--pink);
        }
        .page-content {
            flex: 1;
            width: 100%;
            padding: 32px 24px 50px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: var(--pink);
        }
        .header p {
            font-family: "OCR A Std", monospace;
            font-size: 16px;
            margin-top: 4px;
            color: var(--muted);
            font-weight: 600;
        }

        /* Clear button */
        #clearBtn {
            flex-shrink: 0;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: Marker Felt, fantasy;
            letter-spacing: 0.08em;
            font-size: 22px;
        }
        #clearBtn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Empty state */
        .empty {
            padding: 60px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 15px;
        }

        .empty span {
            display: block;
            margin-bottom: 12px;
            font-size: 40px;
        }

        /* Scan cards */
        .card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg2);
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--purple);
        }

        /* Coloured left bar */
        .card-bar {
            width: 4px;
            min-width: 4px;
            align-self: stretch;
            border-radius: 4px;
        }

        .bar-safe {
            background: var(--safe);
        }

        .bar-warning {
            background: var(--warning);
        }

        .bar-danger {
            background: var(--danger);
        }

        .bar-checking {
            background: var(--purple);
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 6px;
        }

        .risk-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .badge-safe {
            background: rgba(80, 243, 102, 0.12);
            color: var(--safe);
        }

        .badge-warning {
            background: rgba(255, 147, 40, 0.12);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(214, 32, 32, 0.12);
            color: var(--danger);
        }

        .badge-checking {
            background: rgba(204, 96, 193, 0.12);
            color: var(--purple);
        }

        .card-time {
            color: var(--muted);
            font-size: 12.5px;
            text-align: right;
            font-family: "OCR A Std", monospace;
        }

        .card-url {
            margin-bottom: 4px;
            color: var(--text);
            font-family: "OCR A Std", monospace;
            font-size: 14px;
            word-break: break-all;
        }

        .card-subtitle {
            margin-bottom: 8px;
            color: var(--muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            word-break: break-all;
        }

        .flags-list {
            margin-top: 6px;
            list-style: none;
        }

        .flags-list li {
            padding: 2px 0;
            color: var(--muted);
            font-size: 12px;
            font-family: "OCR A Std", monospace;
        }

        .flags-list li::before {
            content: "⚑ ";
            color: var(--purple);
        }

        .no-flags {
            color: var(--safe);
            font-size: 12px;
        }

        /* Download safety history section */
        .downloads-section {
            margin-top: 40px;
        }

        .history-section,
        .downloads-section {
            scroll-margin-top: 96px;
        }

        .history-section:target,
        .downloads-section:target {
            border-radius: 14px;
            outline: 1px solid rgba(204, 96, 193, 0.55);
            outline-offset: 10px;
        }

        /* Footer */
        footer {
            margin-top: 38px;
            border-top: 1px solid var(--border);
            padding-top: 23px;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            font-family: "OCR A Std", monospace;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .page-content {
                padding: 24px 16px 40px;
            }
            .header {
                align-items: flex-start;
                flex-direction: column;
            }
            #clearBtn {
                width: 100%;
            }
            .card-top {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
            }
            .card-time {
                text-align: left;
            }
            footer {
                align-items: flex-start;
                flex-direction: column;
                padding: 32px 20px;
            }
            .footer-links {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <a href="index.html" class="nav-logo">
            <img src="icon/capybara_black_-removebg-preview.png" alt="Footprint">
            Footprint
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Homepage</a></li>
            <li><a href="watermark.html">Image Protection</a></li>
            <li><a href="username.html">Username Check</a></li>
            <li><a href="hygiene.html">Cyber Hygiene</a></li>
        </ul>
    </nav>

    <main class="page-content">

        <!-- Scan history section -->
        <section id="scanHistorySection" class="history-section">
        <div class="header">
            <div>
                <h1>🐾 Scan History</h1>
                <p id="scanCount">No scans recorded.</p>
            </div>

            <button id="clearBtn" type="button">
                🗑 Clear History
            </button>
        </div>

        <!-- Scan history cards -->
        <div id="historyList"></div>
        </section>

        <!-- Download safety history section -->
        <section id="downloadHistorySection" class="downloads-section">

            <div class="header">
                <div>
                    <h1>📥 Download Safety History</h1>
                    <p id="downloadCount">No downloads analysed yet.</p>
                </div>
            </div>

            <div id="downloadList"></div>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        © 2025 Footprint · Built by Rivyashiniy Jayaraj · APU FYP
    </footer>

    <script src="scanhistory.js"></script>

</body>
</html>
